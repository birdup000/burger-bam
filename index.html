<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Bam - Serve the Burger!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Header / HUD -->
        <header>
            <div class="branding">
                <h1>🍔 Burger Bam</h1>
            </div>
            <div id="score-board">
                <div class="score-item">
                    <span class="label">Cash:</span>
                    <span id="money">$0</span>
                </div>
                <div class="score-item">
                    <span class="label">Rating:</span>
                    <span id="rating">50%</span>
                </div>
                <div class="score-item">
                    <span class="label">Day Timer:</span>
                    <span id="day-timer">3:00</span>
                </div>
            </div>
        </header>

        <main>
            <!-- Customer Queue Area -->
            <section id="queue-section">
                <h2>Customers Waiting</h2>
                <div id="customer-queue" class="queue-list">
                    <!-- Queue items populated by JS -->
                </div>
            </section>

            <!-- Active Customer Area -->
            <section id="active-section">
                <div id="active-customer-area">
                    <p>No customers waiting...</p>
                </div>
            </section>

            <!-- Preparation & Cooking Area -->
            <section id="prep-section">
                <div id="grill-station">
                    <h2>🔥 Grill Station</h2>
                    <div class="grill-visual">
                        <svg viewBox="0 0 100 100" width="100" height="100">
                            <rect x="10" y="10" width="80" height="80" fill="#333" rx="10" />
                            <rect x="20" y="20" width="60" height="60" fill="#444" rx="5" />
                            <ellipse id="patty-visual" cx="50" cy="50" rx="25" ry="15" fill="#8D6E63" style="transition: fill 0.5s;" />
                        </svg>
                    </div>
                    <div id="grill-controls">
                        <button id="place-patty-btn">Place Patty</button>
                        <button id="remove-patty-btn">Remove Patty</button>
                    </div>
                    <p id="grill-status">Grill Idle</p>
                </div>

                <div id="assembly-station">
                    <h2>🥗 Assembly Station</h2>
                    <div id="assembly-stack" class="burger-stack">
                        <!-- Stacked items appear here -->
                    </div>
                    
                    <div class="ingredient-bar">
                        <div class="ingredient" data-name="lettuce" onclick="addIngredient('lettuce')">
                            <svg class="ing-icon" viewBox="0 0 100 60">
                                <path d="M 10 20 Q 50 40 90 20 L 90 40 Q 50 60 10 40 Z" fill="#8BC34A" stroke="#558B2F" stroke-width="2"/>
                            </svg>
                            <span>Lettuce</span>
                        </div>
                        <div class="ingredient" data-name="tomato" onclick="addIngredient('tomato')">
                            <svg class="ing-icon" viewBox="0 0 100 60">
                                <rect x="10" y="20" width="80" height="20" rx="5" fill="#E53935" stroke="#B71C1C" stroke-width="2"/>
                            </svg>
                            <span>Tomato</span>
                        </div>
                        <div class="ingredient" data-name="cheese" onclick="addIngredient('cheese')">
                            <svg class="ing-icon" viewBox="0 0 100 60">
                                <path d="M 5 25 L 100 25 L 90 35 L 10 35 Z" fill="#FFEB3B" stroke="#FBC02D" stroke-width="2"/>
                                <path d="M 15 25 L 25 15 L 35 25 Z" fill="#FFEB3B"/>
                                <path d="M 65 25 L 75 15 L 85 25 Z" fill="#FFEB3B"/>
                            </svg>
                            <span>Cheese</span>
                        </div>
                        <div class="ingredient" data-name="bacon" onclick="addIngredient('bacon')">
                            <svg class="ing-icon" viewBox="0 0 100 60">
                                <path d="M 10 20 Q 30 10 50 20 T 90 20 L 90 30 Q 70 40 50 30 T 10 30 Z" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
                            </svg>
                            <span>Bacon</span>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button id="clear-btn">Clear Station</button>
                        <button id="serve-btn">Serve Order</button>
                    </div>
                </div>
            </section>
        </main>

        <!-- Serve Feedback Overlay -->
        <div id="serve-feedback" class="feedback"></div>

        <!-- Day End Overlay -->
        <div id="day-end-overlay" class="overlay">
            <div class="overlay-content">
                <h2>Day Complete!</h2>
                <p>Cash Earned: <span id="final-money">$0</span></p>
                <p>Rating: <span id="final-rating">0%</span></p>
                <p>Customers Served: <span id="final-served">0</span></p>
                <button id="reset-day-btn">Start Next Day</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
